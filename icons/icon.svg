<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1a"/>
      <stop offset="100%" stop-color="#06060e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d56e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9a7b1a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6e3fae"/>
      <stop offset="100%" stop-color="#3b1d6e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.4"/>
  <!-- Inner card shape -->
  <rect x="136" y="76" width="240" height="360" rx="20" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.6"/>
  <!-- Star (pentagram-style) -->
  <polygon points="256,110 274,175 342,175 287,215 305,280 256,245 207,280 225,215 170,175 238,175"
           fill="url(#gold)" opacity="0.9"/>
  <!-- Moon left -->
  <path d="M100,256 A60,60 0 1,1 100,136 A45,45 0 1,0 100,256Z" fill="url(#gold)" opacity="0.5" transform="translate(-10,60)"/>
  <!-- Moon right -->
  <path d="M412,256 A60,60 0 1,0 412,136 A45,45 0 1,1 412,256Z" fill="url(#gold)" opacity="0.5" transform="translate(10,60)"/>
  <!-- Decorative dots -->
  <circle cx="256" cy="310" r="5" fill="url(#gold)" opacity="0.7"/>
  <circle cx="236" cy="330" r="3" fill="url(#gold)" opacity="0.5"/>
  <circle cx="276" cy="330" r="3" fill="url(#gold)" opacity="0.5"/>
  <circle cx="256" cy="350" r="4" fill="url(#gold)" opacity="0.6"/>
  <!-- Text -->
  <text x="256" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#gold)" letter-spacing="4">TAROT</text>
  <!-- Small decorative line -->
  <line x1="196" y1="418" x2="316" y2="418" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
</svg>
